# deploy/nginx_uods.conf
# ========================
# Nginx ters vekil (reverse proxy) yapılandırma şablonu.
#
# KURULUM:
#   1) <ALAN_ADINIZ> yer tutucusunu gerçek alan adınızla değiştirin.
#   2) sudo cp deploy/nginx_uods.conf /etc/nginx/sites-available/uods
#   3) sudo ln -s /etc/nginx/sites-available/uods /etc/nginx/sites-enabled/uods
#   4) sudo nginx -t   (yapılandırmayı doğrular)
#   5) sudo systemctl reload nginx
#   6) sudo certbot --nginx -d <ALAN_ADINIZ>
#      (Certbot, bu dosyayı otomatik düzenleyip 443 portu + SSL yönlendirmesini
#       ekler; aşağıdaki listen 443 bloğu certbot çalıştırıldıktan SONRA
#       otomatik oluşacağından, ilk kurulumda yalnızca 80 portu blokunu
#       bırakmanız yeterlidir.)
#
# NOT: Gerçek bir alan adı ve bu alan adını gösteren bir DNS A kaydı OLMADAN
# certbot/Let's Encrypt doğrulaması çalışmaz. Alan adı edinmek ve DNS
# yönlendirmesi yapmak bu şablonun kapsamı dışındadır.

server {
    listen 80;
    listen [::]:80;
    server_name <ALAN_ADINIZ>;

    # Yüklenen optik form fotoğrafları büyük olabilir; Flask tarafındaki
    # MAX_UPLOAD_SIZE_MB ile uyumlu tutun.
    client_max_body_size 20M;

    location / {
        proxy_pass http://127.0.0.1:8000;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;

        # OMR + IPFS + blokzincir işlemi senkron olarak beklenebildiğinden
        # (rapor 3.6.2), nginx'in varsayılan 60s zaman aşımı bazı durumlarda
        # yetersiz kalabilir; gunicorn'un kendi timeout'uyla (120s) uyumlu
        # tutulmuştur.
        proxy_read_timeout 120s;
        proxy_send_timeout 120s;
    }

    location /static/ {
        alias /opt/uods_project/static/;
        expires 7d;
        access_log off;
    }
}
